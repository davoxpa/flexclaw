<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <style>
    @page { size: A4; margin: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 10.5pt;
      line-height: 1.7;
      color: #374151;
      background: #ffffff;
    }

    /* ── Copertina ───────────────────────────────────────────── */
    .cover {
      background: linear-gradient(135deg, #1e3a5f 0%, #2d3748 100%);
      padding: 64px 55px 50px;
      min-height: 180px;
    }
    .cover-label {
      font-size: 7.5pt;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #d69e2e;
      margin-bottom: 18px;
    }
    .cover h1 {
      font-size: 26pt;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      max-width: 480px;
    }
    .cover-divider {
      width: 56px;
      height: 3px;
      background: #d69e2e;
      border-radius: 2px;
      margin-top: 22px;
    }

    /* ── Contenuto ───────────────────────────────────────────── */
    .content { padding: 40px 55px; }

    h2 {
      font-size: 13.5pt;
      font-weight: 700;
      color: #1e3a5f;
      margin-top: 30px;
      margin-bottom: 10px;
      padding-left: 12px;
      border-left: 4px solid #d69e2e;
    }
    h3 {
      font-size: 11pt;
      font-weight: 600;
      color: #2d3748;
      margin-top: 20px;
      margin-bottom: 7px;
    }
    p { margin-bottom: 12px; }

    ul, ol { margin: 10px 0 12px 24px; }
    li { margin-bottom: 5px; }

    blockquote {
      margin: 18px 0;
      padding: 12px 18px;
      background: #f0f4f8;
      border-left: 4px solid #2563eb;
      border-radius: 0 6px 6px 0;
      font-style: italic;
      color: #4a5568;
    }
    code {
      font-family: 'Courier New', Courier, monospace;
      font-size: 9pt;
      background: #f0f4f8;
      padding: 1px 5px;
      border-radius: 3px;
    }
    pre {
      font-family: 'Courier New', Courier, monospace;
      font-size: 9pt;
      background: #f0f4f8;
      padding: 14px 16px;
      border-radius: 6px;
      margin: 12px 0;
      white-space: pre-wrap;
    }
    hr { border: none; border-top: 1px solid #e2e8f0; margin: 24px 0; }
    a { color: #2563eb; }
    strong { font-weight: 700; color: #1a202c; }
    em { font-style: italic; color: #4a5568; }

    table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 9.5pt; }
    th { background: #1e3a5f; color: #fff; padding: 8px 12px; text-align: left; font-weight: 600; }
    td { padding: 7px 12px; border-bottom: 1px solid #e2e8f0; }
    tr:nth-child(even) td { background: #f8fafc; }

    .footer {
      margin-top: 40px;
      padding-top: 14px;
      border-top: 1px solid #e2e8f0;
      font-size: 8pt;
      color: #9ca3af;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="cover-label">Articolo</div>
    <h1>__TITLE__</h1>
    <div class="cover-divider"></div>
  </div>
  <div class="content">
    __BODY_HTML__
    <div class="footer">Generato da FlexClaw AI</div>
  </div>
</body>
</html>
