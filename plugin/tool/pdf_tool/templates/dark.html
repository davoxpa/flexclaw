<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <style>
    @page { size: A4; margin: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 10.5pt;
      line-height: 1.75;
      color: #cbd5e1;
      background: #0f172a;
    }

    /* ── Copertina ───────────────────────────────────────────── */
    .cover {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      border-bottom: 2px solid #6366f1;
      padding: 64px 55px 50px;
      min-height: 180px;
    }
    .cover-label {
      font-size: 7.5pt;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #6366f1;
      margin-bottom: 18px;
    }
    .cover h1 {
      font-size: 26pt;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.2;
      max-width: 480px;
    }
    .cover-divider {
      width: 50px;
      height: 2px;
      background: #6366f1;
      margin-top: 22px;
    }

    /* ── Contenuto ───────────────────────────────────────────── */
    .content { padding: 40px 55px; }

    h2 {
      font-size: 13pt;
      font-weight: 700;
      color: #a5b4fc;
      margin-top: 30px;
      margin-bottom: 10px;
      padding-bottom: 7px;
      border-bottom: 1px solid #1e293b;
    }
    h3 {
      font-size: 11pt;
      font-weight: 600;
      color: #c7d2fe;
      margin-top: 18px;
      margin-bottom: 7px;
    }
    p { margin-bottom: 12px; color: #cbd5e1; }

    ul, ol { margin: 10px 0 12px 22px; color: #cbd5e1; }
    li { margin-bottom: 5px; }

    blockquote {
      margin: 18px 0;
      padding: 12px 20px;
      background: #1e293b;
      border-left: 3px solid #6366f1;
      border-radius: 0 6px 6px 0;
      font-style: italic;
      color: #94a3b8;
    }
    code {
      font-family: 'Courier New', Courier, monospace;
      font-size: 9pt;
      background: #1e293b;
      color: #a5b4fc;
      padding: 1px 5px;
      border-radius: 3px;
    }
    pre {
      font-family: 'Courier New', Courier, monospace;
      font-size: 9pt;
      background: #1e293b;
      color: #e2e8f0;
      padding: 14px 16px;
      border-radius: 6px;
      border: 1px solid #2d3748;
      margin: 12px 0;
      white-space: pre-wrap;
    }
    hr { border: none; border-top: 1px solid #1e293b; margin: 24px 0; }
    a { color: #818cf8; }
    strong { color: #f1f5f9; font-weight: 600; }
    em { color: #94a3b8; font-style: italic; }

    table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 9.5pt; }
    th {
      background: #1e293b;
      color: #a5b4fc;
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid #6366f1;
    }
    td { padding: 7px 12px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
    tr:nth-child(even) td { background: #0d1424; }

    .footer {
      margin-top: 40px;
      padding-top: 14px;
      border-top: 1px solid #1e293b;
      font-size: 8pt;
      color: #334155;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="cover-label">Articolo</div>
    <h1>__TITLE__</h1>
    <div class="cover-divider"></div>
  </div>
  <div class="content">
    __BODY_HTML__
    <div class="footer">Generato da FlexClaw AI</div>
  </div>
</body>
</html>
