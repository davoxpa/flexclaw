<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <style>
    @page { size: A4; margin: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 12pt;
      line-height: 1.7;
      color: #1a1a1a;
      background: #ffffff;
    }

    /* ── Copertina ───────────────────────────────────────────── */
    .cover {
      padding: 60px 60px 40px;
      border-bottom: 1px solid #e5e5e5;
    }
    .cover h1 {
      font-size: 24pt;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.2;
    }

    /* ── Contenuto ───────────────────────────────────────────── */
    .content { padding: 40px 60px; }

    h2 {
      font-size: 15pt;
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 28px;
      margin-bottom: 8px;
    }
    h3 {
      font-size: 13pt;
      font-weight: 600;
      color: #333;
      margin-top: 16px;
      margin-bottom: 6px;
    }
    p { margin-bottom: 12px; }

    ul, ol { margin: 8px 0 12px 22px; }
    li { margin-bottom: 4px; }

    blockquote {
      margin: 16px 0;
      padding: 10px 16px;
      border-left: 3px solid #ccc;
      color: #555;
      font-style: italic;
    }
    code {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10pt;
      background: #f5f5f5;
      padding: 1px 4px;
      border-radius: 2px;
    }
    pre {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10pt;
      background: #f5f5f5;
      padding: 12px 14px;
      border-radius: 4px;
      margin: 10px 0;
      white-space: pre-wrap;
    }
    hr { border: none; border-top: 1px solid #e5e5e5; margin: 20px 0; }
    a { color: #1a1a1a; text-decoration: underline; }
    strong { font-weight: 700; }
    em { font-style: italic; color: #444; }

    table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 11pt; }
    th { border-bottom: 2px solid #1a1a1a; padding: 6px 10px; text-align: left; font-weight: 700; }
    td { padding: 6px 10px; border-bottom: 1px solid #e5e5e5; }

    .footer {
      margin-top: 36px;
      padding-top: 10px;
      border-top: 1px solid #e5e5e5;
      font-size: 9pt;
      color: #bbb;
    }

    /* ── Regole di impaginazione multi-pagina ────────────────── */
    h2, h3, h4 { break-after: avoid; }
    blockquote, pre, figure { break-inside: avoid; }
    tr { break-inside: avoid; }
    li { break-inside: avoid; }
    p { orphans: 3; widows: 3; }
    img { max-width: 100%; height: auto; display: block; margin: 12px 0; }
  </style>
</head>
<body>
  <div class="cover">
    <h1>__TITLE__</h1>
  </div>
  <div class="content">
    __BODY_HTML__
    <div class="footer">Generato da FlexClaw AI</div>
  </div>
</body>
</html>
